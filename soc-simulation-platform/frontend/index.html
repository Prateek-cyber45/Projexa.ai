<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SOC Simulation Platform — Security Operations Center training with live attack scenarios, AI/ML threat detection and dual scoring." />
    <meta name="theme-color" content="#030712" />

    <!-- Inline SVG favicon — no external file needed -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>" />

    <!-- JetBrains Mono for the terminal aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>SOC Simulation Platform</title>

    <!-- Prevent flash of unstyled content -->
    <style>
      html, body { background-color: #030712; color: #f0fdf4; margin: 0; padding: 0; }
      #root { min-height: 100vh; }
      /* Loading spinner shown before React mounts */
      #boot-screen {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #030712;
        font-family: 'JetBrains Mono', monospace; color: #16a34a;
        gap: 12px; z-index: 9999;
      }
      #boot-screen .shield { font-size: 48px; }
      #boot-screen .label  { font-size: 11px; letter-spacing: 0.2em; opacity: 0.7; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      #boot-screen .cursor { animation: blink 1s step-end infinite; }
    </style>
  </head>

  <body>
    <!-- Shown until React hydrates -->
    <div id="boot-screen">
      <div class="shield">🛡</div>
      <div>SOC SIMULATION PLATFORM</div>
      <div class="label">INITIALIZING SYSTEM<span class="cursor">_</span></div>
    </div>

    <div id="root"></div>

    <!-- Hide boot screen once React is ready -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var boot = document.getElementById('boot-screen');
          if (boot) boot.style.display = 'none';
        }, 800);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
