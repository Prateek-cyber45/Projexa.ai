# main.com routing
server {
    listen 80;
    server_name main.com localhost;

    location / {
        proxy_pass http://main:3000;
    }

    # Keep existing Next.js main frontend reachable under /app
    location /app/ {
        proxy_pass http://main-frontend:3000/;
        proxy_set_header Host $host;
    }

    # Path-based routing alternatives for local testing
    location = /academy {
        return 302 /academy/;
    }

    location ^~ /academy/ {
        proxy_pass http://academy-frontend:3000/;
        proxy_set_header Host $host;
    }

    location = /labs {
        return 302 /labs/;
    }

    location ^~ /labs/ {
        proxy_pass http://labs-frontend:3000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}

# api.main.com routing
server {
    listen 80;
    server_name api.main.com;

    location / {
        proxy_pass http://main-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Academy Frontend (LMS UI)
server {
    listen 80;
    server_name academy.main.com;

    location / {
        # Routes to port 3000 (frontend) [cite: 22, 57]
        proxy_pass http://academy-frontend:3000;
        proxy_set_header Host $host;
    }
}

# Academy API
server {
    listen 80;
    server_name api.academy.main.com;

    location / {
        # Routes to academy-api port 5001
        proxy_pass http://academy-api:5001;
        proxy_set_header Host $host;
    }
}

# Labs Frontend (SOC Dashboard - HTTP + WebSocket)
server {
    listen 80;
    server_name labs.main.com;

    location /ws/ {
        proxy_pass http://labs-backend:5002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location / {
        # Routes to labs frontend port 3000
        proxy_pass http://labs-frontend:3000;
        proxy_set_header Host $host;
        
        # Critical for xterm.js WebSockets in Labs
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}

# Grafana Metrics Dashboard (Auth-Gated)
server {
    listen 80;
    server_name metrics.main.com;

    location / {
        # Enforce basic authentication
        auth_basic "Administrator Login Required";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Route to Prometheus/Grafana stack on port 3100 
        proxy_pass http://grafana:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Kibana SIEM Dashboard
server {
    listen 80;
    server_name kibana.main.com;

    location / {
        # Route to Kibana on port 5601 
        proxy_pass http://kibana:5601;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}