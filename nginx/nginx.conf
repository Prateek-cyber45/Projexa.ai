user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── Gzip Compression ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Rate Limiting Zones ──────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # ── Upstream Definitions ─────────────────────────
    upstream main_api   { server main-api:8001; }
    upstream academy_api { server academy-api:8002; }
    upstream labs_ws    { server labs-backend:4000; }
    upstream ai_engine  { server ai-engine:8003; }
    upstream ai_stream  { server ai-stream:8004; }
    upstream frontend   { server frontend:3003; }

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # ── Security Headers ─────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Auth Endpoints (Rate Limited) ────────────
        location /api/main/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://main_api/api/main/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/main/register {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://main_api/api/main/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/main/password-reset/ {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://main_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Main API ────────────────────────────────
        location /api/main/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://main_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Academy API ─────────────────────────────
        location /api/academy/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://academy_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Threat Intel API ────────────────────────
        location /api/threat-intel {
            proxy_pass http://main_api/api/threat-intel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 5m;
        }

        # ── WebSockets for Labs ──────────────────────
        location /labs-ws/ {
            proxy_pass http://labs_ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── AI Engine & Stream ───────────────────────
        location /ai/engine/ {
            proxy_pass http://ai_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /ai/stream/ {
            proxy_pass http://ai_stream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Frontend (Catch-All) ─────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Error Pages ──────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            default_type application/json;
            return 429 '{"detail": "Too many requests. Please slow down."}';
        }
    }
}
