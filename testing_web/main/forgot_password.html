<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deep Hunt — Password Recovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#adc7ff",
          "primary-container": "#4a8eff",
          "background": "#131313",
          "on-surface": "#e2e2e2",
          "on-surface-variant": "#c1c6d7",
        },
        fontFamily: {
          "headline": ["Manrope"],
          "body": ["Inter"],
        }
      }
    }
  }
</script>
<style>
  body { background: radial-gradient(circle at top right, rgba(74, 142, 255, 0.1), #131313 40%); color: #e2e2e2; }
  .glass { background: rgba(33, 33, 33, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
  .demo-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 8px; width: 100%; padding: 12px 16px; outline: none; transition: 0.3s; }
  .demo-input:focus { border-color: #adc7ff; box-shadow: 0 0 10px rgba(173, 199, 255, 0.2); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center font-body selection:bg-primary-container selection:text-[#00285b]">

  <div class="glass w-full max-w-md p-10 rounded-2xl shadow-2xl relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
    
    <div class="text-center mb-8">
    <a href="/" class="flex items-center justify-center gap-3 mb-6">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-[0_0_20px_rgba(74,142,255,0.2)]">
        <span class="material-symbols-outlined text-[#00285b]" style="font-variation-settings: 'FILL' 1;">security</span>
      </div>
      <span class="text-xl font-extrabold tracking-tighter text-white font-headline">Deep Hunt</span>
    </a>
      <p class="text-on-surface-variant text-sm">Enter your operator email address.</p>
    </div>

    <form id="resetForm" class="space-y-5">
      <div id="successBox" class="hidden bg-green-500/10 border border-green-500/20 text-green-200 text-sm p-3 rounded-lg text-center"></div>
      <div id="errorBox" class="hidden bg-red-500/10 border border-red-500/20 text-red-200 text-sm p-3 rounded-lg text-center"></div>
      
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Email Address</label>
        <input type="email" id="email" class="demo-input" required placeholder="operator@deephunt.io" />
      </div>

      <button id="submitBtn" type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container text-[#00285b] font-headline font-bold py-3 rounded-lg hover:shadow-[0_0_20px_rgba(74,142,255,0.25)] transition-all">
        ACTIVATE RECOVERY LOOP
      </button>

      <p class="text-xs text-center text-on-surface-variant mt-6 flex justify-between px-2">
        <a href="/login" class="text-primary hover:underline font-bold">&larr; Back to Login</a>
        <a href="/register" class="hover:text-white transition-colors">Sign Up</a>
      </p>
    </form>
  </div>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const successBox = document.getElementById('successBox');
      const errorBox = document.getElementById('errorBox');
      const btn = document.getElementById('submitBtn');

      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');
      btn.textContent = 'TRANSMITTING...';
      btn.style.opacity = '0.7';

      // Simulate network request
      await new Promise(r => setTimeout(r, 1200));

      if (email.includes('@')) {
          successBox.innerHTML = `Recovery link sent.<br/>Check signals for <b>${email}</b>.`;
          successBox.classList.remove('hidden');
          btn.textContent = 'LINK SENT';
      } else {
          errorBox.textContent = 'Invalid email address.';
          errorBox.classList.remove('hidden');
          btn.textContent = 'ACTIVATE RECOVERY LOOP';
      }
      btn.style.opacity = '1';
    });
  </script>
</body>
</html>
